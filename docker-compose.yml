version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dino-mysql
    environment:
      MYSQL_ROOT_PASSWORD: YOUR_DB_PASS
      MYSQL_DATABASE: knowall
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dino-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: dino-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/knowall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASS: YOUR_DB_PASS
      AI_API_KEY: YOUR_AI_API_KEY
      AI_BASE_URL: https://YOUR_PROXY_DOMAIN/v1
      AI_MODEL: glm/glm-5
      DASHSCOPE_API_KEY: YOUR_DASHSCOPE_API_KEY
      VL_MODEL: qwen3.6-plus
      TTS_MODEL: qwen3-tts-flash
      TTS_VOICE: CHERRY
      JWT_SECRET: YOUR_JWT_SECRET
      JWT_EXPIRATION: "604800000"
      MINIO_ENDPOINT: http://YOUR_SERVER_IP:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: tts-audio
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: dino-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  minio-data:
  minio-config:
