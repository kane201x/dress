server:
  port: 8080
  tomcat:
    max-http-header-size: 8KB

logging:
  level:
    org.apache.coyote.http11.Http11Processor: ERROR
    org.apache.coyote.http11.Http11InputBuffer: ERROR

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.batch_size: 200
        order_inserts: true
        order_updates: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

ai:
  dashscope:
    api-key: ${AI_API_KEY}
    base-url: ${AI_BASE_URL}
    model: ${AI_MODEL}
    direct-api-key: ${DASHSCOPE_API_KEY}
    vl-model: ${VL_MODEL}
    tts-model: ${TTS_MODEL}
    tts-voice: ${TTS_VOICE}

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
