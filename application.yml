server:
  port: 8080
  tomcat:
    max-http-header-size: 8KB

logging:
  level:
    org.apache.coyote.http11.Http11Processor: ERROR
    org.apache.coyote.http11.Http11InputBuffer: ERROR

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://YOUR_SERVER_IP:3306/knowall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASS:YOUR_DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.batch_size: 200
        order_inserts: true
        order_updates: true

ai:
  dashscope:
    api-key: ${AI_API_KEY:YOUR_AI_API_KEY}
    base-url: ${AI_BASE_URL:https://YOUR_PROXY_DOMAIN/v1}
    model: ${AI_MODEL:glm/glm-5}
    direct-api-key: ${DASHSCOPE_API_KEY:YOUR_DASHSCOPE_API_KEY}
    vl-model: ${VL_MODEL:qwen3.6-plus}

jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}
